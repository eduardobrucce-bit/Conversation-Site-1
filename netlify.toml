[build]
  command = "NODE_ENV=production pnpm build"
  publish = "artifacts/dona-ruth/dist"
  functions = "artifacts/dona-ruth/netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[redirects]]
  from = "/api/products"
  to = "/.netlify/functions/products"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
