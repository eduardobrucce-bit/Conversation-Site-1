[build]
  command = "NODE_ENV=production pnpm install --no-frozen-lockfile && NODE_ENV=production pnpm --filter @workspace/dona-ruth run build"
  publish = "artifacts/dona-ruth/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[functions]
  node_bundler = "esbuild"
  directory = "artifacts/dona-ruth/netlify/functions"

[[redirects]]
  from = "/api/products"
  to = "/.netlify/functions/products"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
